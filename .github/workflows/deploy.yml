name: Deploy to GitHub Pages

# Builds the Vite app and deploys dist/ to GitHub Pages on every push to main.
# Set Settings → Pages → Source to "GitHub Actions" (no gh-pages branch needed).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy-pages action requires.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer push supersede an in-flight deploy; never cancel a run mid-deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Typecheck + lint + test + build (fails the deploy if any step fails).
      # The Vite build inlines these at build time; without them the deployed
      # site shows the "Supabase not configured" screen. Set both as GitHub repo
      # secrets (Settings → Secrets and variables → Actions). Anon/publishable
      # key only — NEVER the service-role/secret key.
      - name: Check and build
        run: npm run check
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
