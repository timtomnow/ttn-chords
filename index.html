<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafafa" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TTN Chords" />
    <title>TTN Chords</title>
    <script>
      // Apply theme + accent synchronously to avoid a flash of the wrong palette.
      // Mirrored in src/app/theme.tsx and src/lib/accent.ts — keep in sync.
      (function () {
        try {
          var stored = localStorage.getItem('ttn-chords:theme');
          var pref = stored === 'light' || stored === 'dark' ? stored : 'system';
          var dark =
            pref === 'dark' ||
            (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');

          var accent = localStorage.getItem('ttn-chords:accent-rgb');
          if (accent) document.documentElement.style.setProperty('--accent-rgb', accent);
          var accentFg = localStorage.getItem('ttn-chords:accent-fg-rgb');
          if (accentFg) document.documentElement.style.setProperty('--accent-fg-rgb', accentFg);
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body class="bg-ink-50 text-ink-900 antialiased dark:bg-ink-950 dark:text-ink-50">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- ttn-backup integration: cross-app utility at /ttn-backup/ -->
    <script src="/ttn-backup/client.js" defer></script>
  </body>
</html>
